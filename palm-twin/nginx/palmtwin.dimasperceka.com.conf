# nginx site for palmtwin.dimasperceka.com — reverse proxy to the app container.
#
# Install on the server:
#   sudo cp nginx/palmtwin.dimasperceka.com.conf /etc/nginx/sites-available/palmtwin.dimasperceka.com
#   sudo ln -s /etc/nginx/sites-available/palmtwin.dimasperceka.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d palmtwin.dimasperceka.com   # adds HTTPS (443) automatically

server {
    listen 80;
    listen [::]:80;
    server_name palmtwin.dimasperceka.com;

    # GeoJSON / large assets can be sizeable — allow generous bodies/timeouts.
    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
