# SawitChain app (CodeIgniter main + /api) reverse proxy.
# Deploy: copy to /etc/nginx/sites-available/, symlink into sites-enabled/,
# then run certbot --nginx (it adds the :443 block + HTTP->HTTPS redirect).
server {
    listen 80;
    listen [::]:80;
    server_name sawit.global-compliance-system.com;

    # App allows 64M uploads (php upload_max_filesize=64M).
    client_max_body_size 64m;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # Preserve public Host so CI base_url uses the real domain.
        proxy_set_header Host              $host;
        # The container trusts this (SetEnvIf -> HTTPS=on) to emit https URLs.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        proxy_http_version 1.1;
        proxy_read_timeout 300s;   # matches php max_execution_time=300
        proxy_send_timeout 300s;
        proxy_redirect off;
    }
}
