# EUDR Forest Compliance API (FastAPI, container `eudr-api`) @ 127.0.0.1:8000
#   api.sawitchain.com -> 127.0.0.1:8000
# Deploy: copy to /etc/nginx/sites-available/, symlink into sites-enabled/,
# then run certbot --nginx -d api.sawitchain.com (adds :443 + HTTP->HTTPS redirect).
server {
    listen 80;
    listen [::]:80;
    server_name api.sawitchain.com;

    # Analisis GeoJSON bisa besar (API batas 50MB).
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        proxy_http_version 1.1;
        # Analisis Earth Engine bisa lama -> timeout longgar (hindari 504).
        proxy_connect_timeout 60s;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_redirect off;
    }
}
