# Palm Oil Digital Twin (React SPA + Express API) reverse proxy.
# Must be served at a host ROOT (the SPA uses absolute /assets/* and same-origin
# /api/* ), so it gets its own subdomain. Deploy: copy to sites-available/,
# symlink into sites-enabled/, then run certbot --nginx.
server {
    listen 80;
    listen [::]:80;
    server_name palmtwin.global-compliance-system.com;

    client_max_body_size 64m;

    location / {
        proxy_pass http://127.0.0.1:5003;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_redirect off;
    }
}
